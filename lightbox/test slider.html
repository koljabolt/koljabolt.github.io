<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            body {
                width: 100%;
                height: 100vh;
                margin: 0;
                padding: 0;
                background: rgb(50, 50, 120);
            }
            .center {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .slider {
                width: 100%;
                height: fit-content;
                padding: 70px 0;
                overflow: auto;
            }

            .slider::-webkit-scrollbar {
                width: 80px;
                height: 5px;
            }
            .slider::-webkit-scrollbar-thumb {
                background: rgb(255, 255, 255);
                border-radius: 10px;
            }
            .slider::-webkit-scrollbar-track {
                background: rgba(200, 200, 200, 0.4)
            }
            .card {
                width: 300px;
                height: 300px;
                background: white;
                box-shadow: 0 30px 30px rgba(0,0,0,0.14);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                font-family: "Helvetica Neue";
                position: relative;
                margin: 0 20px;
            }

            .title {
                font-size: 40px;
                font-weight: 100;
            }

            .subtitle {
                font-size: 14px;
            }

            .cards {
                width: fit-content;
                display: flex;
                align-items: center;
                justify-content: center;
            }

        </style>
    </head>
    <body>
        <div class="center">
            <div class="slider">
                <div class="cards">
                    <div class="card">
                        <div class="title">HTML</div>
                        <div class="subtitle">Bootcamp</div>
                    </div>
                    <div class="card">
                        <div class="title">HTML</div>
                        <div class="subtitle">Bootcamp</div>
                    </div>
                    <div class="card">
                        <div class="title">HTML</div>
                        <div class="subtitle">Bootcamp</div>
                    </div>
                    <div class="card">
                        <div class="title">HTML</div>
                        <div class="subtitle">Bootcamp</div>
                    </div>
                    <div class="card">
                        <div class="title">HTML</div>
                        <div class="subtitle">Bootcamp</div>
                    </div>
                </div>
            </div>
        </div>


    </body>
</html>
