<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            body{
                background: #dde1e5;
                background-image: url("images/bg text 01.png");
            }
            h1 {
                color:  rgb(106, 106, 106);
                font-family: "Helvetica Neue", sans-serif;
                font-size: 40px;
                font-stretch: condensed;
            }
            h2 {
                color: rgb(124, 124, 124);
                font-family: "Helvetica Neue Light", sans-serif;
                font-size: 20px;
                text-align: center;
                outline-style: none;
                padding: 2px;
                font-weight: lighter;
            }
            img {
                max-width: 100%;
                height: auto;
            }

            .griddy {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 1px;
                padding: 10px;
                margin:10px;
                border: 1px;
                grid-template-areas: 
                    "topleft topcenter topright"
                    "midleft midcenter midright"
                    "picleft piccenter picright"
                    "footer footer footer";
            }
            .griddy div {
                padding: 5px;
            }
            .griddy div.topleft {
                grid-area: topleft;

            }
            .griddy div.topcenter {
                grid-area: topcenter;
                justify-content: center;
                text-align: center;
                max-width: 100%;
                height: auto;
            }
            .griddy div.topright {
                grid-area: topright;
            }
            .griddy div.midleft {
                grid-area: midleft;
                text-align: center;
            }
            .griddy div.midcenter {
                grid-area: midcenter;
                text-align: center;
                justify-content: center;
                height: auto;
            }
            .griddy div.midright {
                grid-area: midright;
            }    
            .griddy div.picleft {
                grid-area: picleft;
            }
            .griddy div.piccenter {
                grid-area: piccenter;
                align-items: center;
                text-align: center;
            }
            .griddy div.picright {
                grid-area: picright;
                align-self: center;
            }

            .griddy div.footer {
                grid-area: footer;
                text-align: center;
                font-family: Helvetica, sans-serif;
                font-size: 10 px;
                padding-top: 50%;
                color:rgb(106, 106, 106);
            }

            /* Container holding the image and menu */
            .dropdown {
            position: relative;
            display: inline-block;
            }

            /* Style the image as a button */
            .dropbtn {
                width: 100px;
                height: auto;
                border-radius: 10%; 
                cursor: pointer;
                padding-top: 15%;
            }

            /* Hidden dropdown content */
            .dropdown-content {
                display: none;
                position: absolute;
                background-color: #f9f9f9;
                min-width: 100px;
                box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
                z-index: 1;
            }

            /* Links inside the dropdown */
            .dropdown-content a {
                color: black;
                padding: 12px 16px;
                text-decoration: none;
                display: block;
                font-family: "Helvetica Neue", sans-serif;
                font-size: 14px;
                text-align: center;
            }

            /* Show content on hover */
            .dropdown:hover .dropdown-content {
                display: block;
            }

            .dropdown:hover .dropbtn {
            background-color: #e3e3e3;
            }
        </style>
    </head>
    <body>
        <body>
    <div style="text-align:center; padding: 40px; "> 
      <div class="dropdown">
        <img src="images/newmenu.png" alt="MENU" class="dropbtn">
        <div class="dropdown-content">
          <a href="art.html">ART</a>
          <a href="prj.html">PROJECTS</a>
        </div>
      </div>
    </div>
    <div style="text-align: center; padding-top: 50px;">
      <a href="https://vimeo.com/user75997028" target="_blank"><img src="images/vimeo.png" width="60px" alt="vimeo"></a>
      <a href="https://www.instagram.com/koljapipkin" target="_blank"><img src="images/insta.png" width="60px" alt="insta"></a>
      <a href=""target="_blank"><img src="images/cv.png" width="60px" alt="cv"></a>
    </div>
    <div class="griddy">
      <div class="topcenter">
        <h1>KOLJA BOLDYREV</h1><br>
        <img src="images/logo.webp" alt="photo"><br>
      </div>
      <div class="midcenter">
        <h2> Digital Art Animation Storytelling </h2>
      </div>
      <div class="piccenter">
        <a href="art.html"><img src="images/art.gif" alt="artwork"></a>
        <a href="prj.html"><img src="images/prj.gif" alt="projects"></a>
      </div>  
    </div>
    <p style="text-align: center; padding: 20px;">© 2024 Kolja Boldyrev. All rights reserved.</p> 
    </body>
</html>
