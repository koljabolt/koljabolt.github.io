<html>
  <head>
    <title>Kolja HTML website</title>
    <meta charset="UTF-8">
    <meta name="description" content="Artist/Animator portfolio webpage">
    <meta name="keywords" content="HTML, CSS">
    <meta name="author" content="Kolja Boldyrev">
  </head>
  <!--link rel="stylesheet" href="style.css"-->
  <style>
    body{
    background: #dde1e5;
    background-image: url("images/bg text 01.png");
    }

    h1 {
        color:  salmon;
        font-family: "Helvetica Neue", sans-serif;
        font-size: 40px;
    }

    h2 {
        color: olive;
        font-family: "Helvetica Neue Light", sans-serif;
        font-size: 15px;
        text-align: center;
        outline-style: none;
        padding: 2px;
    }
    .griddy {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr  1fr;
      gap: 1px;
      padding: 20%;
      border: 1px;
      grid-template-areas: 
        "topleft top1 top2 top3 topright"
        "midleft mid1 mid2 mid3 midright"
        "picleft pic1 piccenter pic2 picright"
        "footer footer footer footer footer";
    }
    .griddy div {
      padding: 10px;
    }
    .griddy div.top1 {
      grid-area: top1;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 100%;
      height: auto;
    }
    .griddy div.top2 {
      grid-area: top2;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 100%;
      height: auto;
    }
    .griddy div.top3 {
      grid-area: top3;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 100%;
      height: auto;
    }
    .griddy div.mid1 {
      grid-area: mid1;
      text-align: center;
      height: auto;
    }
    .griddy div.mid2 {
      grid-area: mid2;
      text-align: center;
      height: auto;
    }
    .griddy div.mid3 {
      grid-area: mid3;
      text-align: center;
      height: auto;
    }
    .griddy div.midright {
      grid-area: midright;
      text-align: center;
      height: auto;
    }    
    .griddy div.midcenter {
      grid-area: midcenter;
      align-self: center;
      justify-self: center;
      padding: 20%;
      max-width: 100%;
      height: auto;
    }
    .griddy div.pic1 {
      grid-area: pic1;
      align-self: center;
      justify-self: center;
      padding: 20%;
      max-width: 100%;
      height: auto;
    }
    .griddy div.pic2 {
      grid-area: pic2;
      align-self: center;
      justify-self: center;
      padding: 20%;
      max-width: 100%;
      height: auto;
    }
    .griddy div.footer {
      grid-area: footer;
      text-align: center;
      font-family: Helvetica, sans-serif;
      font-size: 10 px;
      padding-top: 50%;
    }
    .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
            max-height: auto;
            text-align: center;
    }

    img {
      max-width: 100%;
      height: auto;
    }
  </style>
  <body>
    <div class="wrapper">
      <div class="dropdown">
        <button class="dropbtn"></button>
        <div class="dropdown-content">
          <a href="index.html">Home</a>
          <a href="art.html">Art</a>
          <a href="prj.html">Projects</a>
        </div>
      </div>
    </div>
    <div class="griddy">
      <div class="top1">
        <h1>KOLJA</h1>
      </div>
      <div class="top2">
        <img src="images/logo.webp" alt="logo"><br>
      </div>
      <div class="top3">
        <h1>BOLDYREV</h1>
      </div>
      <div class="mid1">
        <h2> Digital Art 
        </h2>
      </div>
      <div class="mid2">
        <h2> Animation </h2>
      </div>
      <div class="mid3">
        <h2> Storytelling</h2>
      </div>
      <div class="pic1">
        <a href="art.html"><img src="images/art.png" alt="artwork"></a>
      </div>
      <div class="pic2">
        <a href="prj.html"><img src="images/prj.png" alt="projects"></a>
      </div>
      <div class="footer">
        <p>© 2024 Kolja Boldyrev. All rights reserved.</p>
      </div>
    </div>
  </body>
</html>
