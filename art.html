<!DOCTYPE html>

    <head>
        <script src="lightbox/lightbox-plus-jquery.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="lightbox/lightbox.css" rel="stylesheet" />
        <title>Art Page</title>

    <style>
        body {
            background: #dde1e5;
            background-image: url("images/bg text 01.png");
            background-repeat: repeat;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 0px;
        }
        .video-container {
            width: 200px; /* Adjust as needed */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
        width: 100%;
        display: block;
        }
        .box {
            width: 200px;
            height: 150px;
            object-fit: cover;
        }
        #lightbox { 
            position: fixed !important; 
            top: 50% !important; 
            transform: translateY(-50%); 
        }

        #lightboxOverlay { 
            position: fixed !important; 
            top: 0; left: 0; height: 100% !important; 
            width: 100% !important; 
        }
        h1 {
            color:  rgb(106, 106, 106);
            font-family: "Helvetica Neue", sans-serif;
            font-size: 40px;
            font-stretch: condensed;
            text-align: center;
            outline-style: none;
            padding:30px 0px;
            margin: 20px 0px;
            border-style: none;
            border: 0px;
        }
        h2 {
            color: rgb(75, 75, 75);
            font-family: "Helvetica Neue Light", sans-serif;
            font-size: 20px;
            text-align: center;
            outline-style: none;
            padding: 2px;
            font-weight: lighter;
        }
        h3 {
            font-family: "Helvetica Neue Light", sans-serif;
            font-size: 15px;
            text-align: center;
            font-weight: lighter;
            padding: 2px;
            color: grey
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
            max-height: auto;
            text-align: center;
        }
    </style>
