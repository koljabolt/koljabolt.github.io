<!DOCTYPE html>

    <head>
        <script src="lightbox/lightbox-plus-jquery.js"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="lightbox/lightbox.css" rel="stylesheet" />
    </head>
    <style>
        .body {
            background: #afb7bf;
            background-image: url("images/bg text 01.png");
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 0px;
        }
        .video-container {
            width: 200px; /* Adjust as needed */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
        width: 100%;
        display: block;
        }
        .box {
            width: 200px;
            height: 150px;
            object-fit: cover;
        }
        #lightbox { 
            position: fixed !important; 
            top: 50% !important; 
            transform: translateY(-50%); 
        }

        #lightboxOverlay { 
            position: fixed !important; 
            top: 0; left: 0; height: 100% !important; 
            width: 100% !important; 
        }
        h1 {
            color:  rgb(106, 106, 106);
            font-family: "Helvetica Neue", sans-serif;
            font-size: 40px;
            font-stretch: condensed;
            text-align: center;
            outline-style: none;
            padding: 30px 8px 30px 8px;
            margin: 0px 20px 0px 20px;
            border-style: none;
            border: 0px;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
            max-height: auto;
            text-align: center;
        }
    </style>
